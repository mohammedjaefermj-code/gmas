<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMAS · UI Test Suite</title>
<style>
  :root {
    --navy:      #0f1923;
    --navy-mid:  #1a2736;
    --gold:      #c9a84c;
    --gold-pale: #f5edda;
    --slate:     #6b7f96;
    --white:     #f7f9fb;
    --surface:   #ffffff;
    --danger:    #d94f4f;
    --danger-bg: #fdf0f0;
    --success:   #2e9e6b;
    --success-bg:#edf7f3;
    --warn:      #b45309;
    --warn-bg:   #fffbeb;
    --border:    #dde4ed;
    --text-main: #1a2736;
    --text-sub:  #6b7f96;
    --text-pale: #a8b8c8;
    --radius:    8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--white);
    color: var(--text-main);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--navy);
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    width: 38px; height: 38px; background: var(--gold);
    border-radius: 9px; display: flex; align-items: center; justify-content: center;
  }
  .logo-mark svg { width: 20px; height: 20px; }
  .logo-text strong { font-size: 17px; font-weight: 800; color: var(--white); display: block; }
  .logo-text span { font-size: 10px; color: #a8b8c8; text-transform: uppercase; letter-spacing: 0.08em; }

  /* ── Scoreboard ── */
  .scoreboard {
    display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
  }
  .score-chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.1); color: var(--white);
  }
  .score-chip .dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .dot-pass { background: var(--success); }
  .dot-fail { background: var(--danger); }
  .dot-skip { background: var(--slate); }
  .dot-warn { background: var(--gold); }
  .dot-run  { background: var(--gold); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  /* ── Controls ── */
  .controls {
    display: flex; gap: 8px; flex-wrap: wrap;
    padding: 16px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius);
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; font-family: inherit; transition: opacity 0.15s;
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary { background: var(--navy); color: var(--white); }
  .btn-primary:hover:not(:disabled) { background: var(--navy-mid); }
  .btn-gold    { background: var(--gold); color: var(--navy); }
  .btn-gold:hover:not(:disabled) { background: #b8933e; }
  .btn-ghost   { background: transparent; color: var(--text-sub); border: 1.5px solid var(--border); }
  .btn-ghost:hover:not(:disabled) { border-color: var(--slate); color: var(--text-main); }
  .btn-danger  { background: var(--danger-bg); color: var(--danger); border: 1.5px solid #f0c0c0; }

  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--border); background: transparent;
    color: var(--text-sub); font-family: inherit; transition: all 0.12s;
  }
  .filter-btn.active { border-color: var(--navy); background: var(--navy); color: var(--white); }

  /* ── Search ── */
  .search-wrap {
    position: relative; flex: 1; min-width: 180px; max-width: 300px;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; stroke: var(--text-pale); pointer-events: none;
  }
  .search-input {
    width: 100%; padding: 7px 12px 7px 32px;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    font-size: 13px; color: var(--text-main); background: var(--white);
    font-family: inherit; outline: none;
  }
  .search-input:focus { border-color: var(--gold); }

  /* ── Layout ── */
  .layout { display: flex; min-height: calc(100vh - 120px); }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    padding: 16px 12px;
    position: sticky; top: 120px; align-self: flex-start;
    max-height: calc(100vh - 120px); overflow-y: auto;
  }
  .section-label {
    font-size: 10px; font-weight: 700; color: var(--text-pale);
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 8px 4px; margin-top: 8px;
  }
  .sidebar-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 10px; border-radius: 6px; cursor: pointer;
    font-size: 12.5px; color: var(--text-sub); margin-bottom: 1px;
    transition: background 0.1s; user-select: none;
  }
  .sidebar-item:hover { background: var(--white); color: var(--text-main); }
  .sidebar-item.active { background: var(--gold-pale); color: var(--navy); font-weight: 600; }
  .sidebar-count {
    font-size: 10px; font-weight: 700; color: var(--white);
    background: var(--slate); padding: 1px 6px; border-radius: 10px;
  }
  .sidebar-count.fail  { background: var(--danger); }
  .sidebar-count.pass  { background: var(--success); }
  .sidebar-count.skip  { background: var(--slate); }
  .sidebar-count.warn  { background: var(--warn); }

  /* ── Main ── */
  .main { flex: 1; padding: 24px 28px; min-width: 0; }

  /* ── Progress bar ── */
  .progress-bar-wrap {
    background: var(--border); border-radius: 4px; height: 4px;
    margin: 0 28px 0; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: var(--gold); border-radius: 4px;
    transition: width 0.3s; width: 0%;
  }

  /* ── Group header ── */
  .group-header {
    font-size: 13px; font-weight: 700; color: var(--navy);
    padding: 4px 0 10px; border-bottom: 1.5px solid var(--border);
    margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
  }
  .group-badge {
    font-size: 10px; font-weight: 700; color: var(--text-sub);
    background: var(--white); border: 1px solid var(--border);
    padding: 1px 8px; border-radius: 10px;
  }

  /* ── Test row ── */
  .test-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 14px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    margin-bottom: 8px; transition: border-color 0.15s, background 0.15s;
  }
  .test-item.pass  { background: var(--success-bg); border-color: #b0d9c4; }
  .test-item.fail  { background: var(--danger-bg);  border-color: #f0c0c0; }
  .test-item.warn  { background: var(--warn-bg);    border-color: #fcd34d; }
  .test-item.skip  { background: var(--white);      border-color: var(--border); }
  .test-item.running{ background: #fffdf0;          border-color: var(--gold); }

  .test-status-icon {
    width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
  }
  .icon-pass { background: var(--success); color: #fff; }
  .icon-fail { background: var(--danger);  color: #fff; }
  .icon-warn { background: var(--warn);    color: #fff; }
  .icon-skip { background: var(--border);  color: var(--slate); }
  .icon-run  { background: var(--gold);    color: var(--navy); animation: pulse 0.8s infinite; }

  .test-body { flex: 1; min-width: 0; }
  .test-name {
    font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 2px;
  }
  .test-desc { font-size: 12px; color: var(--text-sub); margin-bottom: 0; }
  .test-result {
    font-size: 11.5px; margin-top: 5px; padding: 5px 9px;
    border-radius: 5px; font-family: 'SF Mono', 'Fira Code', monospace;
    white-space: pre-wrap; word-break: break-all;
  }
  .result-pass { background: rgba(46,158,107,0.1); color: #1a6b45; }
  .result-fail { background: rgba(217,79,79,0.12); color: #911; }
  .result-warn { background: rgba(180,83,9,0.1);  color: var(--warn); }

  .test-timing {
    font-size: 10px; color: var(--text-pale); margin-top: 3px; font-family: monospace;
  }
  .test-role-tag {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 2px 6px; border-radius: 4px; margin-left: 6px;
    background: var(--gold-pale); color: var(--navy-mid);
    display: inline-block; vertical-align: middle;
  }

  /* ── Empty / loading ── */
  .empty-state {
    text-align: center; padding: 60px 24px; color: var(--text-pale);
  }
  .empty-state svg { width: 40px; height: 40px; stroke: var(--border); margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--text-sub); }
  .empty-desc  { font-size: 13px; margin-top: 4px; }

  /* ── Log panel ── */
  .log-wrap {
    background: var(--navy); border-radius: var(--radius);
    padding: 16px 18px; font-family: 'SF Mono', monospace;
    font-size: 11px; color: #a8c5e8; max-height: 260px;
    overflow-y: auto; margin-top: 24px;
  }
  .log-line { line-height: 1.8; }
  .log-pass  { color: #5dd69c; }
  .log-fail  { color: #f87171; }
  .log-warn  { color: #fbbf24; }
  .log-info  { color: #a8c5e8; }
  .log-dim   { color: #4a6070; }

  /* ── Spinner ── */
  .spinner {
    width: 12px; height: 12px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.6s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Config modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: var(--surface); border-radius: 14px;
    padding: 28px; width: 100%; max-width: 480px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .modal-sub   { font-size: 13px; color: var(--text-sub); margin-bottom: 20px; }
  .form-group  { margin-bottom: 14px; }
  .form-label  {
    display: block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-sub); margin-bottom: 5px;
  }
  .form-input {
    width: 100%; padding: 9px 12px;
    border: 1.5px solid var(--border); border-radius: var(--radius);
    font-size: 13px; color: var(--text-main); font-family: inherit;
    outline: none; background: var(--white);
  }
  .form-input:focus { border-color: var(--gold); }
  .form-hint { font-size: 11px; color: var(--text-pale); margin-top: 4px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

  /* ── Detail drawer (for inspect) ── */
  .detail-drawer {
    background: var(--navy); color: #cfe0f0;
    border-radius: var(--radius); padding: 16px; margin-top: 6px;
    font-size: 11px; font-family: monospace; white-space: pre-wrap;
    max-height: 200px; overflow-y: auto; display: none;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0f1923" stroke-width="2.5" stroke-linecap="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    </div>
    <div class="logo-text">
      <strong>GMAS Test Suite</strong>
      <span>UI · Workflow · Event Coverage</span>
    </div>
  </div>
  <div class="scoreboard" id="scoreboard">
    <div class="score-chip"><span class="dot dot-pass"></span><span id="score-pass">0</span> pass</div>
    <div class="score-chip"><span class="dot dot-fail"></span><span id="score-fail">0</span> fail</div>
    <div class="score-chip"><span class="dot dot-warn"></span><span id="score-warn">0</span> warn</div>
    <div class="score-chip"><span class="dot dot-skip"></span><span id="score-skip">0</span> skip</div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress-bar"></div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn btn-gold" id="btn-run-all" onclick="runAll()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Run All Tests
  </button>
  <button class="btn btn-primary" id="btn-run-group" onclick="runActiveGroup()" disabled>
    Run Section
  </button>
  <button class="btn btn-ghost" onclick="resetAll()">
    Reset
  </button>
  <button class="btn btn-ghost" onclick="openConfig()">
    ⚙ Configure URL
  </button>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="test-search" placeholder="Filter tests…" oninput="filterTests()">
  </div>

  <div class="filter-group">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-filter="fail" onclick="setFilter('fail',this)">Failures</button>
    <button class="filter-btn" data-filter="warn" onclick="setFilter('warn',this)">Warnings</button>
    <button class="filter-btn" data-filter="pass" onclick="setFilter('pass',this)">Passed</button>
    <button class="filter-btn" data-filter="skip" onclick="setFilter('skip',this)">Not run</button>
  </div>
</div>

<!-- Layout -->
<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar"></div>

  <!-- Main content -->
  <div class="main" id="main-content">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <div class="empty-title">Ready to run</div>
      <div class="empty-desc">Configure your GMAS URL then press Run All Tests</div>
    </div>
    <div id="test-output" style="display:none;"></div>

    <!-- Log -->
    <div class="log-wrap" id="run-log" style="display:none;">
      <div id="log-lines"></div>
    </div>
  </div>
</div>

<!-- Config modal -->
<div class="modal-overlay" id="modal-config">
  <div class="modal-card">
    <div class="modal-title">Configure Test Target</div>
    <div class="modal-sub">Point the suite at your running GMAS instance.</div>
    <div class="form-group">
      <label class="form-label">GMAS App URL</label>
      <input class="form-input" id="cfg-url" placeholder="https://your-app.netlify.app" type="url">
      <div class="form-hint">The suite opens this in an iframe and inspects the DOM. Must be same-origin or allow framing.</div>
    </div>
    <div class="form-group">
      <label class="form-label">Test User — Email (GM Manager / system_admin)</label>
      <input class="form-input" id="cfg-email" placeholder="admin@example.com" type="email">
    </div>
    <div class="form-group">
      <label class="form-label">Test User — Password</label>
      <input class="form-input" id="cfg-pass" placeholder="••••••••" type="password">
    </div>
    <div class="form-group">
      <label class="form-label">Champions Test User — Email</label>
      <input class="form-input" id="cfg-champ-email" placeholder="champions@example.com" type="email">
    </div>
    <div class="form-group">
      <label class="form-label">Champions Test User — Password</label>
      <input class="form-input" id="cfg-champ-pass" placeholder="••••••••" type="password">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConfig()">Cancel</button>
      <button class="btn btn-gold" onclick="saveConfig()">Save & Close</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
let config = {
  url: localStorage.getItem('gmas_test_url') || '',
  email: localStorage.getItem('gmas_test_email') || '',
  pass: '',
  champEmail: localStorage.getItem('gmas_test_champ_email') || '',
  champPass: '',
};

function openConfig() {
  document.getElementById('cfg-url').value = config.url;
  document.getElementById('cfg-email').value = config.email;
  document.getElementById('cfg-pass').value = config.pass;
  document.getElementById('cfg-champ-email').value = config.champEmail;
  document.getElementById('cfg-champ-pass').value = config.champPass;
  document.getElementById('modal-config').classList.add('open');
}
function closeConfig() { document.getElementById('modal-config').classList.remove('open'); }
function saveConfig() {
  config.url        = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  config.email      = document.getElementById('cfg-email').value.trim();
  config.pass       = document.getElementById('cfg-pass').value;
  config.champEmail = document.getElementById('cfg-champ-email').value.trim();
  config.champPass  = document.getElementById('cfg-champ-pass').value;
  localStorage.setItem('gmas_test_url', config.url);
  localStorage.setItem('gmas_test_email', config.email);
  localStorage.setItem('gmas_test_champ_email', config.champEmail);
  closeConfig();
  log('info', `Config saved. Target: ${config.url || '(none)'}`);
}

// ─────────────────────────────────────────────────────────────
// TEST REGISTRY
// Each test: { id, group, name, desc, roles, fn }
// fn() → { status:'pass'|'fail'|'warn'|'skip', message, detail? }
// ─────────────────────────────────────────────────────────────
const TESTS = [];
function test(group, name, desc, roles, fn) {
  TESTS.push({ id: TESTS.length, group, name, desc, roles: roles || [], fn,
    status: 'skip', message: '', detail: '', ms: null });
}

// ─────────────────────────────────────────────────────────────
// HELPERS — DOM inspection via fetch + DOMParser
// ─────────────────────────────────────────────────────────────
let _cachedHtml = null;
let _cachedDoc  = null;

async function fetchAppHtml() {
  if (!config.url) return null;
  if (_cachedHtml) return _cachedDoc;
  try {
    const resp = await fetch(config.url, { mode: 'cors', credentials: 'omit' });
    const text = await resp.text();
    _cachedHtml = text;
    const parser = new DOMParser();
    _cachedDoc = parser.parseFromString(text, 'text/html');
    return _cachedDoc;
  } catch(e) {
    return null;
  }
}

function hasId(doc, id) { return !!doc?.getElementById(id); }
function hasSelector(doc, sel) { return !!doc?.querySelector(sel); }
function countSelectors(doc, sel) { return doc?.querySelectorAll(sel)?.length || 0; }
function hasText(doc, selector, text) {
  const el = doc?.querySelector(selector);
  return el ? el.textContent.includes(text) : false;
}
function hasOnclick(doc, handler) {
  return !!doc?.querySelector(`[onclick*="${handler}"]`);
}
function hasFn(doc, fnName) {
  // Search for function declaration in script tags
  const scripts = [...(doc?.querySelectorAll('script') || [])];
  return scripts.some(s => s.textContent.includes(`function ${fnName}`) ||
                            s.textContent.includes(`async function ${fnName}`));
}

// Lightweight "can we load the page" check
async function ping() {
  if (!config.url) return { ok: false, reason: 'No URL configured' };
  try {
    const r = await fetch(config.url, { method: 'HEAD', mode: 'cors' });
    return { ok: r.ok, status: r.status };
  } catch(e) {
    return { ok: false, reason: e.message };
  }
}

// ─────────────────────────────────────────────────────────────
// TEST DEFINITIONS
// ─────────────────────────────────────────────────────────────

// ── 1. PAGE LOAD & STRUCTURE ─────────────────────────────────
test('Page Load', 'App reachable', 'HTTP HEAD request returns 200', [], async () => {
  const r = await ping();
  if (!r.ok) return { status: 'fail', message: `Unreachable — ${r.reason || 'HTTP ' + r.status}` };
  return { status: 'pass', message: `HTTP ${r.status} OK` };
});

test('Page Load', 'HTML parses without errors', 'DOMParser can load the document', [], async () => {
  const doc = await fetchAppHtml();
  if (!doc) return { status: 'fail', message: 'Could not fetch or parse HTML' };
  const errs = doc.querySelectorAll('parsererror');
  if (errs.length) return { status: 'fail', message: 'DOMParser reported errors' };
  return { status: 'pass', message: 'Document parsed cleanly' };
});

test('Page Load', 'Login screen present', 'Element #login-screen exists in DOM', [], async () => {
  const doc = await fetchAppHtml();
  if (!doc) return { status: 'skip', message: 'No document' };
  return hasId(doc, 'login-screen')
    ? { status: 'pass', message: '#login-screen found' }
    : { status: 'fail', message: '#login-screen missing' };
});

test('Page Load', 'App shell present', 'Element #app-screen exists', [], async () => {
  const doc = await fetchAppHtml();
  if (!doc) return { status: 'skip', message: 'No document' };
  return hasId(doc, 'app-screen')
    ? { status: 'pass', message: '#app-screen found' }
    : { status: 'fail', message: '#app-screen missing' };
});

test('Page Load', 'Supabase client loaded', 'Script tag for Supabase JS is present', [], async () => {
  const doc = await fetchAppHtml();
  if (!doc) return { status: 'skip', message: 'No document' };
  const scripts = [...doc.querySelectorAll('script[src]')];
  const found = scripts.some(s => s.src.includes('supabase'));
  return found

// ── 20. SECURITY & DATA INTEGRITY ────────────────────────────
test('Security', 'No Supabase key in HTML source', 'anon key should not be in plain HTML', [], async () => {
  if (!config.url) return { status: 'skip', message: 'No URL configured' };
  // We check the raw HTML for long bearer-style tokens
  const doc = await fetchAppHtml();
  if (!doc) return { status: 'skip', message: 'No document' };
  // Check for obviously hardcoded long JWT-like strings in non-script context
  // This is a heuristic — anon keys are fine, service role keys are not
  const scripts = [...doc.querySelectorAll('script')];
  const body = scripts.map(s => s.textContent).join('');
  const hasServiceRole = body.includes('service_role');
  if (hasServiceRole) return { status: 'fail', message: '⚠ "service_role" found in client code — CRITICAL security issue' };
  return { status: 'pass', message: 'No service role key found in client code' };
});

test('Security', 'escHtml used in table renders', 'Injections in customer/payment data prevented', [], async () => {
  const doc = await fetchAppHtml();
  if (!doc) return { status: 'skip', message: 'No document' };
  const scripts = [...doc.querySelectorAll('script')];
  const body = scripts.map(s => s.textContent).join('');
  const count = (body.match(/escHtml\(/g) || []).length;
  if (count >= 20) return { status: 'pass', message: `escHtml() called ${count} times — good coverage` };
  if (count >= 10) return { status: 'warn', message: `escHtml() called ${count} times — may have gaps` };
  return { status: 'fail', message: `escHtml() only called ${count} times — XSS risk` };
});

test('Security', 'confirm() before destructive actions', 'Browser confirm dialogs on deletes', [], async () => {
  const doc = await fetchAppHtml();
  if (!doc) return { status: 'skip', message: 'No document' };
  const scripts = [...doc.querySelectorAll('script')];
  const body = scripts.map(s => s.textContent).join('');
  const count = (body.match(/\bconfirm\(/g) || []).length;
  if (count >= 3) return { status: 'pass', message: `confirm() used ${count} times on destructive actions` };
  if (count >= 1) return { status: 'warn', message: `confirm() only ${count} time(s) — some destructive actions may have no confirmation` };
  return { status: 'warn', message: 'No confirm() dialogs found — all destructive actions are silent' };
});

// ─────────────────────────────────────────────────────────────
// GROUPS — sidebar & run-group logic
// ─────────────────────────────────────────────────────────────
const GROUPS = [...new Set(TESTS.map(t => t.group))];
let activeGroup = null;
let activeFilter = 'all';
let searchQuery  = '';

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  for (const g of GROUPS) {
    const tests = TESTS.filter(t => t.group === g);
    const counts = { pass: 0, fail: 0, warn: 0, skip: 0 };
    tests.forEach(t => counts[t.status]++);
    const total = tests.length;
    const done  = total - counts.skip;
    const dominant = done === 0 ? 'skip'
                   : counts.fail > 0 ? 'fail'
                   : counts.warn > 0 ? 'warn'
                   : 'pass';
    html += `<div class="sidebar-item ${activeGroup === g ? 'active' : ''}" onclick="setActiveGroup('${g}')">
      <span>${g}</span>
      <span class="sidebar-count ${dominant}">${done}/${total}</span>
    </div>`;
  }
  sb.innerHTML = html;
}

function setActiveGroup(g) {
  activeGroup = g;
  document.getElementById('btn-run-group').disabled = false;
  renderTests();
}

// ─────────────────────────────────────────────────────────────
// RENDERING
// ─────────────────────────────────────────────────────────────
const statusIcon = s => ({
  pass:    `<div class="test-status-icon icon-pass">✓</div>`,
  fail:    `<div class="test-status-icon icon-fail">✕</div>`,
  warn:    `<div class="test-status-icon icon-warn">!</div>`,
  skip:    `<div class="test-status-icon icon-skip">—</div>`,
  running: `<div class="test-status-icon icon-run">▶</div>`,
}[s] || '');

function renderTests() {
  const out = document.getElementById('test-output');
  const empty = document.getElementById('empty-state');

  let tests = TESTS.slice();
  if (activeGroup) tests = tests.filter(t => t.group === activeGroup);
  if (activeFilter !== 'all') tests = tests.filter(t => t.status === activeFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    tests = tests.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      t.group.toLowerCase().includes(q)
    );
  }

  if (!tests.length) {
    out.style.display = 'none';
    empty.style.display = 'block';
    empty.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <div class="empty-title">No tests match</div>
      <div class="empty-desc">Try a different filter or search</div>`;
    return;
  }

  empty.style.display = 'none';
  out.style.display = 'block';

  // Group into sections
  const groups = activeGroup ? [activeGroup] : GROUPS;
  let html = '';

  for (const g of groups) {
    const gTests = tests.filter(t => t.group === g);
    if (!gTests.length) continue;
    const counts = { pass: 0, fail: 0, warn: 0, skip: 0, running: 0 };
    TESTS.filter(t => t.group === g).forEach(t => counts[t.status]++);

    html += `<div class="group-header" style="margin-top:${html ? '24px' : '0'};">
      ${g}
      <span class="group-badge">${gTests.length} shown</span>
      ${counts.fail  ? `<span style="font-size:10px;font-weight:700;color:var(--danger);">${counts.fail} fail</span>` : ''}
      ${counts.warn  ? `<span style="font-size:10px;font-weight:700;color:var(--warn);">${counts.warn} warn</span>` : ''}
      ${counts.pass  ? `<span style="font-size:10px;font-weight:700;color:var(--success);">${counts.pass} pass</span>` : ''}
    </div>`;

    for (const t of gTests) {
      const roleHTML = t.roles.length
        ? t.roles.map(r => `<span class="test-role-tag">${r}</span>`).join(' ')
        : '';
      const resultHTML = t.message
        ? `<div class="test-result result-${t.status === 'running' ? 'info' : t.status}">${t.message}</div>`
        : '';
      const timingHTML = t.ms !== null
        ? `<div class="test-timing">${t.ms}ms</div>`
        : '';

      html += `<div class="test-item ${t.status}" id="test-item-${t.id}">
        ${statusIcon(t.status)}
        <div class="test-body">
          <div class="test-name">${t.name}${roleHTML}</div>
          <div class="test-desc">${t.desc}</div>
          ${resultHTML}
          ${timingHTML}
        </div>
      </div>`;
    }
  }

  out.innerHTML = html;
  buildSidebar();
  updateScoreboard();
}

// ─────────────────────────────────────────────────────────────
// SCOREBOARD & PROGRESS
// ─────────────────────────────────────────────────────────────
function updateScoreboard() {
  const counts = { pass: 0, fail: 0, warn: 0, skip: 0 };
  TESTS.forEach(t => counts[t.status] = (counts[t.status] || 0) + 1);
  document.getElementById('score-pass').textContent = counts.pass || 0;
  document.getElementById('score-fail').textContent = counts.fail || 0;
  document.getElementById('score-warn').textContent = counts.warn || 0;
  document.getElementById('score-skip').textContent = (counts.skip || 0) + (counts.running || 0);

  const done = TESTS.filter(t => t.status !== 'skip' && t.status !== 'running').length;
  const pct  = TESTS.length > 0 ? (done / TESTS.length * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ─────────────────────────────────────────────────────────────
// RUNNER
// ─────────────────────────────────────────────────────────────
let running = false;

async function runAll() {
  if (running) return;
  if (!config.url) { openConfig(); return; }
  running = true;
  _cachedHtml = null; _cachedDoc = null; // bust cache
  document.getElementById('btn-run-all').disabled = true;
  document.getElementById('btn-run-all').innerHTML = '<span class="spinner"></span> Running…';
  document.getElementById('run-log').style.display = 'block';
  document.getElementById('log-lines').innerHTML = '';

  const testsToRun = TESTS;
  log('info', `Starting ${testsToRun.length} tests against ${config.url}`);

  for (const t of testsToRun) {
    t.status = 'running';
    t.message = '';
    t.ms = null;
    updateTestItem(t);

    const start = Date.now();
    try {
      const result = await t.fn();
      t.status  = result.status;
      t.message = result.message || '';
      t.ms = Date.now() - start;
    } catch(e) {
      t.status  = 'fail';
      t.message = `Exception: ${e.message}`;
      t.ms = Date.now() - start;
    }

    updateTestItem(t);
    buildSidebar();
    updateScoreboard();
    log(t.status, `[${t.group}] ${t.name}: ${t.message}`);
    await sleep(20); // yield for render
  }

  running = false;
  document.getElementById('btn-run-all').disabled = false;
  document.getElementById('btn-run-all').innerHTML = `
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Run All Tests`;

  const counts = { pass: 0, fail: 0, warn: 0 };
  TESTS.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
  log('info', `Done. Pass: ${counts.pass}  Fail: ${counts.fail}  Warn: ${counts.warn}`);
}

async function runActiveGroup() {
  if (!activeGroup || running) return;
  if (!config.url) { openConfig(); return; }
  running = true;
  _cachedHtml = null; _cachedDoc = null;
  document.getElementById('btn-run-group').disabled = true;
  document.getElementById('run-log').style.display = 'block';

  const testsToRun = TESTS.filter(t => t.group === activeGroup);
  log('info', `Running ${testsToRun.length} tests in [${activeGroup}]`);

  for (const t of testsToRun) {
    t.status = 'running';
    t.message = '';
    t.ms = null;
    updateTestItem(t);

    const start = Date.now();
    try {
      const result = await t.fn();
      t.status  = result.status;
      t.message = result.message || '';
      t.ms = Date.now() - start;
    } catch(e) {
      t.status  = 'fail';
      t.message = `Exception: ${e.message}`;
      t.ms = Date.now() - start;
    }
    updateTestItem(t);
    buildSidebar();
    updateScoreboard();
    log(t.status, `${t.name}: ${t.message}`);
    await sleep(20);
  }

  running = false;
  document.getElementById('btn-run-group').disabled = false;
}

function updateTestItem(t) {
  const el = document.getElementById(`test-item-${t.id}`);
  if (!el) { renderTests(); return; }
  el.className = `test-item ${t.status}`;
  const icon = el.querySelector('.test-status-icon');
  if (icon) icon.outerHTML = statusIcon(t.status);

  const body = el.querySelector('.test-body');
  if (body) {
    const roleHTML = t.roles.length
      ? t.roles.map(r => `<span class="test-role-tag">${r}</span>`).join(' ')
      : '';
    const resultHTML = t.message
      ? `<div class="test-result result-${t.status === 'running' ? 'info' : t.status}">${t.message}</div>`
      : '';
    const timingHTML = t.ms !== null ? `<div class="test-timing">${t.ms}ms</div>` : '';
    body.innerHTML = `
      <div class="test-name">${t.name}${roleHTML}</div>
      <div class="test-desc">${t.desc}</div>
      ${resultHTML}${timingHTML}`;
  }
}

function resetAll() {
  TESTS.forEach(t => { t.status = 'skip'; t.message = ''; t.ms = null; });
  _cachedHtml = null; _cachedDoc = null;
  document.getElementById('run-log').style.display = 'none';
  document.getElementById('log-lines').innerHTML = '';
  renderTests();
  buildSidebar();
  updateScoreboard();
}

// ─────────────────────────────────────────────────────────────
// FILTER & SEARCH
// ─────────────────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTests();
}

function filterTests() {
  searchQuery = document.getElementById('test-search').value;
  renderTests();
}

// ─────────────────────────────────────────────────────────────
// LOG
// ─────────────────────────────────────────────────────────────
function log(level, msg) {
  const lines = document.getElementById('log-lines');
  const cls = { pass: 'log-pass', fail: 'log-fail', warn: 'log-warn', info: 'log-info', skip: 'log-dim' }[level] || 'log-info';
  const prefix = { pass: '✓', fail: '✕', warn: '!', info: '›', skip: '—' }[level] || '›';
  const time = new Date().toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  lines.innerHTML += `<div class="log-line ${cls}"><span class="log-dim">${time}</span>  ${prefix}  ${msg}</div>`;
  const wrap = document.getElementById('run-log');
  wrap.scrollTop = wrap.scrollHeight;
}

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
buildSidebar();
renderTests();
updateScoreboard();

if (!config.url) {
  setTimeout(openConfig, 400);
}
</script>
