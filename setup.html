<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GM AS — Setup</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: system-ui, sans-serif; background: #0f1923; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 24px; box-sizing: border-box; }
  .card { background: white; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; }
  h2 { margin: 0 0 6px; font-size: 20px; color: #0f1923; }
  p { margin: 0 0 24px; font-size: 13px; color: #6b7f96; }
  label { display: block; font-size: 11px; font-weight: 700; color: #6b7f96; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 14px; border: 1.5px solid #dde4ed; border-radius: 8px; font-size: 14px; margin-bottom: 16px; box-sizing: border-box; outline: none; font-family: inherit; }
  input:focus { border-color: #c9a84c; }
  button { width: 100%; padding: 12px; background: #c9a84c; color: #0f1923; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
  .msg.error { background: #fdf0f0; color: #d94f4f; border: 1px solid #f0c0c0; display: block; }
  .msg.success { background: #edf7f3; color: #2e9e6b; border: 1px solid #b0e0cc; display: block; }
  .warning { background: #fef3e2; border: 1px solid #fcd9a0; border-radius: 8px; padding: 12px; font-size: 12px; color: #b45309; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="card">
  <h2>GM AS — First Time Setup</h2>
  <p>Create your GM Manager account to get started.</p>

  <div class="warning">⚠️ Delete this file from GitHub after setup is complete.</div>

  <label>Full Name</label>
  <input type="text" id="name" placeholder="Your name" value="MJ">

  <label>Email</label>
  <input type="email" id="email" placeholder="you@example.com" value="mohammedjaefer.mj@gmail.com">

  <label>Password</label>
  <input type="password" id="password" placeholder="Min 8 characters">

  <button id="btn" onclick="setup()">Create Account</button>
  <div class="msg" id="msg"></div>
</div>

<script>
const SUPABASE_URL = 'https://ngdrwcvnpfhopvkduixc.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nZHJ3Y3ZucGZob3B2a2R1aXhjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NTE5NzgsImV4cCI6MjA5NzIyNzk3OH0.HB3TlGR5k5ta_XrFSdi4UwSvCbtLuzy2W3CHM6ayU3s';
const { createClient } = window.supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function setup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn');
  const msg = document.getElementById('msg');

  msg.className = 'msg';
  msg.textContent = '';

  if (!name || !email || !password) { showMsg('All fields are required.', 'error'); return; }
  if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }

  btn.disabled = true;
  btn.textContent = 'Creating...';

  // Step 1: Sign up
  const { data, error } = await sb.auth.signUp({ email, password });

  if (error) {
    showMsg('Signup error: ' + error.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Create Account';
    return;
  }

  const userId = data?.user?.id;
  if (!userId) {
    showMsg('User created but no ID returned. Check your email for a confirmation link, then sign into gmas.html — your profile will be created automatically on first login.', 'success');
    btn.disabled = false;
    btn.textContent = 'Create Account';
    return;
  }

  // Step 2: Upsert profile
  const { error: profileError } = await sb.from('profiles').upsert({
    id: userId,
    full_name: name,
    organization: 'GM',
    role: 'Manager',
    is_active: true
  });

  if (profileError) {
    showMsg('Account created but profile failed: ' + profileError.message + '. Try signing in to gmas.html anyway.', 'error');
  } else {
    showMsg('✓ Account created successfully! Go to gmas.html and sign in now.', 'success');
  }

  btn.disabled = false;
  btn.textContent = 'Create Account';
}

function showMsg(text, type) {
  const msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
}
</script>
</body>
</html>
